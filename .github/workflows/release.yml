name: Release

# 推送形如 v0.2.1 的标签时触发：构建 Windows 安装包并发布 GitHub Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (src-tauri/target)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 仓库同时存在 bun.lock 与 pnpm-lock.yaml，显式指定用 bun 调 Tauri CLI
          tauriScript: bun run tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Muffin Tidy ${{ github.ref_name }}"
          releaseBody: "媒体文件整理工具 ${{ github.ref_name }} — Windows 安装包见下方 Assets。"
          releaseDraft: false
          prerelease: false
